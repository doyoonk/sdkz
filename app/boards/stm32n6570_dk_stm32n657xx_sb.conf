CONFIG_BUILD_OUTPUT_BIN=y
CONFIG_BUILD_OUTPUT_HEX=y

CONFIG_REBOOT=y
CONFIG_UART_CONSOLE=n
CONFIG_XIP=n

# memmory map
CONFIG_FLASH=y
CONFIG_STM32_MEMMAP=y
CONFIG_STM32_XSPIM=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=4096
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_JESD216_API=y
CONFIG_MULTIPLE_EXECUTABLE_RAM_REGIONS=n

# RTC
CONFIG_RTC=y
CONFIG_RTC_CALIBRATION=n
CONFIG_STM32_BACKUP_PROTECTION=y

CONFIG_ENTROPY_STM32_RNG=y
CONFIG_ENTROPY_GENERATOR=y

CONFIG_CRC=y
CONFIG_CRC_HW_HANDLER=n

CONFIG_BASE64=y
CONFIG_NET_BUF=y
CONFIG_ENABLE_MGMT_PERUSER=y

# multi threading
CONFIG_MULTITHREADING=y

# Enable Serial Recovery
CONFIG_MCUBOOT_SERIAL=y
CONFIG_MCUBOOT_INDICATION_LED=y
CONFIG_MCUBOOT_SERIAL_DIRECT_IMAGE_UPLOAD=n
CONFIG_MCUBOOT_BOOTUTIL_LIB=y

CONFIG_BOOT_BANNER=y
CONFIG_BOOT_SERIAL_CDC_ACM=n
#CONFIG_USB_DEVICE_STACK=y
#CONFIG_USB_DEVICE_PRODUCT="OPSPro CDC ACM"
#CONFIG_USB_DEVICE_PID=0x0001
CONFIG_BOOT_SERIAL_UART=y
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU=y
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU_TIMEOUT=2147483647
#CONFIG_BOOT_SERIAL_DETECT_DELAY=10000
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=y
CONFIG_BOOT_SERIAL_IMG_GRP_HASH=y
CONFIG_BOOT_SERIAL_IMG_GRP_IMAGE_STATE=y
CONFIG_BOOT_SERIAL_IMG_GRP_SLOT_INFO=y
CONFIG_BOOT_SERIAL_NO_APPLICATION=y
CONFIG_BOOT_MGMT_ECHO=y
CONFIG_BOOT_SWAP_USING_SCRATCH=n
CONFIG_BOOT_SWAP_USING_MOVE=n

CONFIG_BOOT_SHARE_DATA=y				# - Enables shared data
CONFIG_BOOT_SHARE_DATA_BOOTINFO=y		# - Enables boot information shared data type
CONFIG_BOOT_SHARE_BACKEND_RETENTION=y	# - Stores shared data using retention/blinfo subsystem

CONFIG_RETENTION=y						# - Enables retention system
CONFIG_RETAINED_MEM=y					# - Enables retained memory driver
CONFIG_RETAINED_MEM_ZEPHYR_RAM=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2176

# Enable HW stack protection
CONFIG_HW_STACK_PROTECTION=y

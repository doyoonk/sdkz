CONFIG_BUILD_OUTPUT_BIN=y
CONFIG_BUILD_OUTPUT_HEX=y

CONFIG_REBOOT=y
CONFIG_BOOT_BANNER=y

# memmory map
CONFIG_FLASH=y
CONFIG_STM32_MEMMAP=y
CONFIG_STM32_XSPIM=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

# RTC
CONFIG_RTC=y
CONFIG_RTC_CALIBRATION=n
CONFIG_STM32_BACKUP_PROTECTION=y

CONFIG_ENTROPY_STM32_RNG=y
CONFIG_ENTROPY_GENERATOR=y

CONFIG_CRC=y
CONFIG_CRC_HW_HANDLER=n

CONFIG_BASE64=y
CONFIG_NET_BUF=y

CONFIG_IMG_MANAGER=y
CONFIG_STATS=y
CONFIG_STATS_NAMES=y

CONFIG_MCUBOOT_SERIAL_DIRECT_IMAGE_UPLOAD=y
CONFIG_MCUBOOT_SERIAL=y
CONFIG_MCUBOOT_INDICATION_LED=y

# Enable Serial Recovery by Button
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU=y
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU_TIMEOUT=0
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=y

CONFIG_ENABLE_MGMT_PERUSER=y
CONFIG_BOOT_SERIAL_UART=y
CONFIG_UART_CONSOLE=n

# Add 256 bytes to accommodate upload command (lfs_stat overflows)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2176

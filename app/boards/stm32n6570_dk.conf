CONFIG_ZMS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_SETTINGS_RUNTIME=y

CONFIG_DMA=y
CONFIG_PWM=y
CONFIG_PWM_STM32=y
CONFIG_STM32_BACKUP_PROTECTION=y

# SPI
CONFIG_SPI=y

# memmory map
CONFIG_FLASH=y
CONFIG_STM32_MEMMAP=y
CONFIG_STM32_XSPIM=y

# RTC
CONFIG_RTC=y
CONFIG_RTC_CALIBRATION=n

CONFIG_ENTROPY_STM32_RNG=y
CONFIG_ENTROPY_GENERATOR=y

CONFIG_RETENTION=y
CONFIG_RETENTION_BOOTLOADER_INFO=y
CONFIG_RETENTION_BOOTLOADER_INFO_TYPE_MCUBOOT=y
CONFIG_RETAINED_MEM=y
CONFIG_RETAINED_MEM_ZEPHYR_RAM=y
CONFIG_RETENTION_BOOTLOADER_INFO_OUTPUT_FUNCTION=y

# RAM load
CONFIG_XIP=n
CONFIG_IS_BOOTLOADER=n
CONFIG_MCUBOOT_BOOTLOADER_MODE_RAM_LOAD=y

# boot loader
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_CONFIRMED_IMAGE=y
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="${WEST_TOPDIR}/etc/ssl/certs/mcuboot_sign-rsa-2048.pem"

CONFIG_CRC_HW_HANDLER=n

CONFIG_VIDEO_WIDTH=800
CONFIG_VIDEO_HEIGHT=480
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=1600000

#CONFIG_DEBUG_OPTIMIZATIONS=y
#CONFIG_PWM_LOG_LEVEL_DBG=y
#CONFIG_FLASH_LOG_LEVEL_DBG=y

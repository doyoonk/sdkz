CONFIG_ZMS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_SETTINGS_RUNTIME=y
#CONFIG_RETENTION_BOOTLOADER_INFO_OUTPUT_SETTINGS=y

# boot loader
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_GENERATE_CONFIRMED_IMAGE=y
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="${WEST_TOPDIR}/etc/ssl/certs/mcuboot_sign-rsa-2048.pem"

CONFIG_RETENTION=n
CONFIG_RETENTION_BOOTLOADER_INFO=n
CONFIG_RETENTION_BOOTLOADER_INFO_TYPE_MCUBOOT=n
CONFIG_RETAINED_MEM=n
CONFIG_RETAINED_MEM_ZEPHYR_RAM=n
CONFIG_RETENTION_BOOTLOADER_INFO_OUTPUT_FUNCTION=n
